<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginalia — Library Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Serif+4:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1E7D0; --paper-dim:#e8dcbd; --card:#FBF6E9;
    --ink:#23303A; --ink-soft:#4b5a63;
    --forest:#1B4332; --forest-dark:#0F2A1F; --forest-light:#2D6A4F;
    --oxblood:#8B3A3A; --gold:#B8860B;
    --line:#d3c299; --line-soft:#e2d5ae;
    --shadow: 0 1px 2px rgba(35,48,58,.06), 0 6px 18px rgba(35,48,58,.08);
  }
  html[data-theme="dark"]{
    --paper:#1C2521; --paper-dim:#141b18; --card:#232F2A;
    --ink:#EAE3D2; --ink-soft:#a9b7ae;
    --forest:#3F8F6B; --forest-dark:#173226; --forest-light:#52A785;
    --oxblood:#D97A7A; --gold:#E0B84D;
    --line:#3a4a42; --line-soft:#2c3934;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4', Georgia, serif;transition:background .2s,color .2s;}
  h1,h2,h3,.display{font-family:'Fraunces', Georgia, serif;font-weight:700;letter-spacing:-.01em;}
  .mono{font-family:'JetBrains Mono', monospace;}
  #app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
  .sidebar{background:var(--forest-dark);color:var(--paper);padding:28px 20px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand-mark{width:34px;height:34px;border:1.5px solid var(--gold);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--gold);flex-shrink:0;}
  .brand-name{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--paper);}
  .brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9fb7a9;margin:0 0 26px 44px;}
  nav.tabs{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
  .tab-btn{all:unset;cursor:pointer;display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:4px;font-family:'Source Serif 4',serif;font-size:14.5px;color:#cfe0d5;transition:background .15s ease,color .15s ease;}
  .tab-btn .num{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6f9382;width:16px;}
  .tab-btn:hover{background:rgba(255,255,255,.06);color:#fff;}
  .tab-btn.active{background:var(--forest);color:#fff;}
  .tab-btn.active .num{color:var(--gold);}
  .sidebar-mid{margin-top:auto;padding-top:14px;}
  .theme-toggle{all:unset;cursor:pointer;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:4px;font-size:13px;color:#cfe0d5;border:1px solid rgba(255,255,255,.15);width:100%;margin-bottom:10px;}
  .theme-toggle:hover{background:rgba(255,255,255,.08);}
  .who-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#9fb7a9;padding:8px 12px 0;border-top:1px solid rgba(255,255,255,.12);margin-top:6px;}
  .who-row button{all:unset;cursor:pointer;color:var(--gold);font-size:11px;text-decoration:underline;}
  main{padding:36px 44px 60px;max-width:1220px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;border-bottom:2px solid var(--ink);padding-bottom:16px;flex-wrap:wrap;gap:12px;}
  .page-head h1{font-size:32px;margin:0 0 4px;}
  .page-head p{margin:0;color:var(--ink-soft);font-size:14.5px;}
  .btn{all:unset;cursor:pointer;font-family:'Source Serif 4',serif;font-size:14.5px;padding:10px 18px;border-radius:3px;background:var(--forest);color:#fff;box-shadow:var(--shadow);transition:background .15s;}
  .btn:hover{background:var(--forest-dark);}
  .btn.secondary{background:transparent;color:var(--ink);border:1.3px solid var(--ink);box-shadow:none;}
  .btn.secondary:hover{background:var(--ink);color:var(--paper);}
  .btn.danger{background:var(--oxblood);}
  .btn.danger:hover{background:#6e2c2c;}
  .btn.gold{background:var(--gold);color:var(--forest-dark);}
  .btn.small{padding:6px 12px;font-size:13px;}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:34px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:5px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--forest);}
  .stat-card.gold::before{background:var(--gold);}
  .stat-card.blood::before{background:var(--oxblood);}
  .stat-num{font-family:'Fraunces',serif;font-size:30px;font-weight:700;line-height:1;}
  .stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);margin-top:8px;}
  .section-title{font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--forest);margin:30px 0 14px;display:flex;align-items:center;gap:10px;}
  .section-title:first-child{margin-top:0;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--line);}
  .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .catalog-card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--forest);border-radius:2px;padding:14px 16px 14px;box-shadow:var(--shadow);position:relative;display:flex;gap:12px;}
  .catalog-card.out{border-left-color:var(--oxblood);}
  .cover{width:52px;height:72px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.25);background-size:cover;background-position:center;}
  .cover-body{flex:1;min-width:0;}
  .call-no{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.03em;}
  .catalog-card h3{font-size:17px;margin:3px 0 1px;line-height:1.25;}
  .catalog-card .author{font-style:italic;color:var(--ink-soft);font-size:13.5px;margin-bottom:6px;}
  .stars{color:var(--gold);font-size:13px;letter-spacing:1px;}
  .rating-line{font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
  .meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .pill{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--line-soft);color:var(--ink-soft);}
  .pill.status-available{background:#e3efe7;border-color:#bcd8c6;color:var(--forest-dark);}
  html[data-theme="dark"] .pill.status-available{background:#1c3129;color:#8fd6b0;}
  .pill.status-out{background:#f2e0e0;border-color:#e0bcbc;color:var(--oxblood);}
  html[data-theme="dark"] .pill.status-out{background:#3a2222;}
  .card-actions{display:flex;gap:6px;flex-wrap:wrap;}
  table{width:100%;border-collapse:collapse;background:var(--card);box-shadow:var(--shadow);border-radius:4px;overflow:hidden;}
  th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:12px 14px;border-bottom:2px solid var(--ink);background:var(--paper-dim);}
  td{padding:11px 14px;border-bottom:1px solid var(--line-soft);font-size:14px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  input[type=text],input[type=date],input[type=email],input[type=number],input[type=password],input[type=url],select,textarea{font-family:'Source Serif 4',serif;font-size:14.5px;padding:9px 12px;border:1.3px solid var(--line);border-radius:3px;background:var(--card);color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--forest-light);outline-offset:1px;}
  .search-input{flex:1;min-width:200px;}
  .stamp{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;padding:4px 9px;border:1.5px solid currentColor;border-radius:3px;transform:rotate(-2deg);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
  .stamp.ok{color:var(--forest);}
  .stamp.warn{color:var(--gold);}
  .stamp.overdue{color:var(--oxblood);}
  .fine-tag{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--oxblood);font-weight:700;}
  .fine-tag.paid{color:var(--forest);text-decoration:line-through;opacity:.7;}
  .overlay{position:fixed;inset:0;background:rgba(15,41,31,.5);display:none;align-items:center;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--paper);border:1px solid var(--line);border-radius:6px;width:min(480px,92vw);max-height:88vh;overflow:auto;padding:28px 28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .modal h2{font-size:22px;margin:0 0 18px;}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .field label{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);}
  .field input,.field select,.field textarea{width:100%;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .empty{text-align:center;padding:50px 20px;color:var(--ink-soft);font-style:italic;}
  .toast{position:fixed;bottom:26px;right:26px;background:var(--forest-dark);color:#fff;padding:13px 20px;border-radius:4px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px;z-index:100;animation:slideIn .25s ease;max-width:340px;}
  @keyframes slideIn{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .star-picker{display:flex;gap:4px;font-size:26px;cursor:pointer;color:var(--line);}
  .star-picker span.active{color:var(--gold);}
  .review-item{border-bottom:1px solid var(--line-soft);padding:8px 0;font-size:13.5px;}
  .review-item:last-child{border-bottom:none;}
  .review-item .who{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .queue-badge{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--gold);color:var(--forest-dark);padding:2px 7px;border-radius:20px;font-weight:700;}
  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:5px;padding:20px 22px;box-shadow:var(--shadow);margin-bottom:22px;}
  .chart-card h3{font-size:15px;margin:0 0 16px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{width:150px;font-size:12.5px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;background:var(--paper-dim);border-radius:3px;height:16px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--forest);border-radius:3px;transition:width .4s ease;}
  .bar-fill.gold{background:var(--gold);}
  .bar-val{width:34px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
  /* LOGIN SCREEN */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--forest-dark);}
  .login-card{background:var(--paper);border-radius:8px;padding:40px 40px 32px;width:min(380px,90vw);box-shadow:0 30px 80px rgba(0,0,0,.4);text-align:center;}
  .login-card .brand-mark{margin:0 auto 14px;width:46px;height:46px;font-size:22px;}
  .login-card h1{font-size:26px;margin:0 0 4px;}
  .login-card p{color:var(--ink-soft);font-size:13.5px;margin:0 0 22px;}
  .login-card .field{text-align:left;}
  .login-hint{font-size:11.5px;color:var(--ink-soft);margin-top:14px;font-family:'JetBrains Mono',monospace;}
  .login-error{color:var(--oxblood);font-size:13px;margin-top:8px;display:none;}
  @media (max-width:820px){
    #app{grid-template-columns:1fr;}
    .sidebar{position:relative;height:auto;flex-direction:row;overflow-x:auto;align-items:center;padding:16px;flex-wrap:wrap;}
    .brand-sub,.sidebar-mid{display:none;}
    nav.tabs{flex-direction:row;margin-top:0;}
    main{padding:22px;}
    .stat-row{grid-template-columns:1fr 1fr;}
    .two-col{grid-template-columns:1fr;}
    .catalog-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="brand-mark">M</div>
    <h1>Marginalia</h1>
    <p>Sign in to manage the library</p>
    <form id="loginForm">
      <div class="field"><label>Username</label><input type="text" id="loginUser" required autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" required autocomplete="current-password"></div>
      <div class="login-error" id="loginError">Incorrect username or password.</div>
      <button type="submit" class="btn" style="width:100%;margin-top:8px;">Sign in</button>
    </form>
    <div class="login-hint">Demo credentials — admin / library123</div>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div class="brand-name">Marginalia</div>
    </div>
    <div class="brand-sub">Library Records</div>
    <nav class="tabs" id="nav">
      <button class="tab-btn active" data-tab="dashboard"><span class="num">01</span>Dashboard</button>
      <button class="tab-btn" data-tab="catalog"><span class="num">02</span>Catalog</button>
      <button class="tab-btn" data-tab="members"><span class="num">03</span>Members</button>
      <button class="tab-btn" data-tab="circulation"><span class="num">04</span>Circulation</button>
      <button class="tab-btn" data-tab="reservations"><span class="num">05</span>Reservations</button>
      <button class="tab-btn" data-tab="analytics"><span class="num">06</span>Analytics</button>
      <button class="tab-btn" data-tab="history"><span class="num">07</span>History</button>
    </nav>
    <div class="sidebar-mid">
      <button class="theme-toggle" id="themeBtn">🌙 Dark mode</button>
      <div class="who-row"><span id="whoAmI">admin</span><button id="logoutBtn">Sign out</button></div>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBody"></div></div>
<div id="toastHost"></div>

<script>
/* ================= AUTH ================= */
const ADMIN_CREDS = {user:'admin', pass:'library123'};
document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(u===ADMIN_CREDS.user && p===ADMIN_CREDS.pass){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='grid';
    document.getElementById('whoAmI').textContent = u;
    render();
  } else {
    document.getElementById('loginError').style.display='block';
  }
});
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
});

/* ================= THEME ================= */
let darkMode = false;
document.getElementById('themeBtn').addEventListener('click', ()=>{
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode?'dark':'light');
  document.getElementById('themeBtn').textContent = darkMode ? '☀️ Light mode' : '🌙 Dark mode';
});

/* ================= STATE ================= */
const FINE_PER_DAY = 10; // ₹ per day overdue

let books = [
  {id:1, title:"The Left Hand of Darkness", author:"Ursula K. Le Guin", isbn:"978-0441478125", genre:"Science Fiction", call:"SF LEG 1969", copies:2, cover:"https://covers.openlibrary.org/b/isbn/978-0441478125-M.jpg", color:"#3B5A73",
    ratings:[{id:1,member:"Maren Ashcroft",stars:5,comment:"Cold planet, warm story.",date:"2026-03-02"},{id:2,member:"Dev Sharma",stars:4,comment:"Slow start, incredible payoff.",date:"2026-04-11"}]},
  {id:2, title:"Braiding Sweetgrass", author:"Robin Wall Kimmerer", isbn:"978-1571313560", genre:"Nature", call:"NAT KIM 2013", copies:1, cover:"https://covers.openlibrary.org/b/isbn/978-1571313560-M.jpg", color:"#4B6B3A",
    ratings:[{id:1,member:"Odalys Ferreira",stars:5,comment:"Changed how I see plants.",date:"2026-02-14"}]},
  {id:3, title:"Piranesi", author:"Susanna Clarke", isbn:"978-1526622426", genre:"Fantasy", call:"FIC CLA 2020", copies:2, cover:"https://covers.openlibrary.org/b/isbn/978-1526622426-M.jpg", color:"#6B4B73", ratings:[]},
  {id:4, title:"The Order of Time", author:"Carlo Rovelli", isbn:"978-0735216105", genre:"Physics", call:"PHY ROV 2017", copies:1, cover:"https://covers.openlibrary.org/b/isbn/978-0735216105-M.jpg", color:"#73594B", ratings:[]},
  {id:5, title:"Homegoing", author:"Yaa Gyasi", isbn:"978-1101971062", genre:"Historical Fiction", call:"FIC GYA 2016", copies:1, cover:"https://covers.openlibrary.org/b/isbn/978-1101971062-M.jpg", color:"#8B3A3A",
    ratings:[{id:1,member:"Maren Ashcroft",stars:5,comment:"Devastating and beautiful.",date:"2026-01-20"}]},
  {id:6, title:"An Immense World", author:"Ed Yong", isbn:"978-0593133231", genre:"Biology", call:"BIO YON 2022", copies:2, cover:"https://covers.openlibrary.org/b/isbn/978-0593133231-M.jpg", color:"#2D6A4F", ratings:[]},
  {id:7, title:"The Overstory", author:"Richard Powers", isbn:"978-0393635522", genre:"Fiction", call:"FIC POW 2018", copies:1, cover:"https://covers.openlibrary.org/b/isbn/978-0393635522-M.jpg", color:"#4B5A3A", ratings:[]},
  {id:8, title:"Sapiens", author:"Yuval Noah Harari", isbn:"978-0062316097", genre:"History", call:"HIS HAR 2015", copies:2, cover:"https://covers.openlibrary.org/b/isbn/978-0062316097-M.jpg", color:"#B8860B",
    ratings:[{id:1,member:"Dev Sharma",stars:4,comment:"Sweeping and provocative.",date:"2026-05-06"},{id:2,member:"Odalys Ferreira",stars:5,comment:"Reread every year.",date:"2026-06-01"}]},
];
let members = [
  {id:1, name:"Maren Ashcroft", email:"maren.a@mail.com", memberNo:"MEM-1001", joined:"2024-02-11"},
  {id:2, name:"Dev Sharma", email:"dev.sharma@mail.com", memberNo:"MEM-1002", joined:"2024-05-03"},
  {id:3, name:"Odalys Ferreira", email:"odalys.f@mail.com", memberNo:"MEM-1003", joined:"2025-01-19"},
];
let transactions = [];
let reservations = [];
let nextIds = {book:9, member:4, txn:1, res:1, rating:3};

function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, days){ const d = new Date(dateStr); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

(function seed(){
  const t1 = {id:nextIds.txn++, bookId:1, memberId:1, issueDate: addDays(todayISO(),-10), dueDate: addDays(todayISO(),4), returnDate:null, finePaid:false};
  const t2 = {id:nextIds.txn++, bookId:5, memberId:2, issueDate: addDays(todayISO(),-20), dueDate: addDays(todayISO(),-6), returnDate:null, finePaid:false};
  const t3 = {id:nextIds.txn++, bookId:8, memberId:3, issueDate: addDays(todayISO(),-30), dueDate: addDays(todayISO(),-16), returnDate: addDays(todayISO(),-15), finePaid:false};
  const t4 = {id:nextIds.txn++, bookId:3, memberId:1, issueDate: addDays(todayISO(),-40), dueDate: addDays(todayISO(),-26), returnDate: addDays(todayISO(),-25), finePaid:false};
  const t5 = {id:nextIds.txn++, bookId:6, memberId:2, issueDate: addDays(todayISO(),-60), dueDate: addDays(todayISO(),-46), returnDate: addDays(todayISO(),-44), finePaid:true};
  transactions.push(t1,t2,t3,t4,t5);
  reservations.push({id:nextIds.res++, bookId:5, memberId:3, requestDate: addDays(todayISO(),-2), fulfilled:false});
})();

function copiesAvailable(book){
  const out = transactions.filter(t=>t.bookId===book.id && !t.returnDate).length;
  return book.copies - out;
}
function bookById(id){ return books.find(b=>b.id===id); }
function memberById(id){ return members.find(m=>m.id===id); }
function avgRating(book){
  if(!book.ratings || !book.ratings.length) return null;
  return book.ratings.reduce((s,r)=>s+r.stars,0)/book.ratings.length;
}
function starString(n){
  const full = Math.round(n);
  return '★'.repeat(full) + '☆'.repeat(5-full);
}
function calcFine(t){
  const endDate = t.returnDate || todayISO();
  const overdueDays = daysBetween(t.dueDate, endDate);
  return overdueDays > 0 ? overdueDays * FINE_PER_DAY : 0;
}

/* ================= NAV ================= */
let currentTab = 'dashboard';
document.getElementById('nav').addEventListener('click', e=>{
  const btn = e.target.closest('.tab-btn');
  if(!btn) return;
  currentTab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b===btn));
  render();
});

/* ================= TOAST ================= */
function toast(msg){
  const host = document.getElementById('toastHost');
  const el = document.createElement('div');
  el.className='toast';
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

/* ================= MODAL ================= */
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });

/* ================= RENDER ROOT ================= */
function render(){
  const main = document.getElementById('main');
  if(currentTab==='dashboard') main.innerHTML = renderDashboard();
  else if(currentTab==='catalog') main.innerHTML = renderCatalog();
  else if(currentTab==='members') main.innerHTML = renderMembers();
  else if(currentTab==='circulation') main.innerHTML = renderCirculation();
  else if(currentTab==='reservations') main.innerHTML = renderReservations();
  else if(currentTab==='analytics') main.innerHTML = renderAnalytics();
  else if(currentTab==='history') main.innerHTML = renderHistory();
  attachHandlers();
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const totalCopies = books.reduce((s,b)=>s+b.copies,0);
  const issuedOut = transactions.filter(t=>!t.returnDate).length;
  const overdue = transactions.filter(t=>!t.returnDate && t.dueDate < todayISO()).length;
  const outstandingFines = transactions.filter(t=>!t.finePaid).reduce((s,t)=>s+calcFine(t),0);
  const pendingRes = reservations.filter(r=>!r.fulfilled).length;
  const recentTx = [...transactions].sort((a,b)=> (b.returnDate||b.issueDate).localeCompare(a.returnDate||a.issueDate)).slice(0,5);

  return `
  <div class="page-head"><div><h1>Dashboard</h1><p>Today is ${formatDate(todayISO())} — here's the state of the stacks.</p></div></div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num">${books.length}</div><div class="stat-label">Titles catalogued</div></div>
    <div class="stat-card gold"><div class="stat-num">${totalCopies - issuedOut}</div><div class="stat-label">Copies on shelf</div></div>
    <div class="stat-card"><div class="stat-num">${issuedOut}</div><div class="stat-label">Currently issued</div></div>
    <div class="stat-card blood"><div class="stat-num">${overdue}</div><div class="stat-label">Overdue</div></div>
    <div class="stat-card blood"><div class="stat-num">₹${outstandingFines}</div><div class="stat-label">Fines outstanding</div></div>
  </div>
  ${pendingRes ? `<div class="empty" style="text-align:left;background:var(--card);border:1px solid var(--line);border-radius:5px;font-style:normal;padding:14px 18px;margin-bottom:24px;">📌 <strong>${pendingRes}</strong> member${pendingRes>1?'s are':' is'} waiting on the reservation list — check the Reservations tab.</div>` : ''}
  <div class="section-title">Recent activity</div>
  ${recentTx.length ? `<table><thead><tr><th>Book</th><th>Member</th><th>Issued</th><th>Due</th><th>Status</th></tr></thead><tbody>
    ${recentTx.map(t=>{
      const b=bookById(t.bookId), m=memberById(t.memberId);
      return `<tr><td>${b?b.title:'—'}</td><td>${m?m.name:'—'}</td><td class="mono">${formatDate(t.issueDate)}</td><td class="mono">${formatDate(t.dueDate)}</td><td>${statusStamp(t)}</td></tr>`;
    }).join('')}
  </tbody></table>` : `<div class="empty">No circulation activity yet.</div>`}
  `;
}
function statusStamp(t){
  if(t.returnDate) return `<span class="stamp ok">Returned</span>`;
  if(t.dueDate < todayISO()) return `<span class="stamp overdue">Overdue</span>`;
  const daysLeft = daysBetween(todayISO(), t.dueDate);
  if(daysLeft<=3) return `<span class="stamp warn">Due soon</span>`;
  return `<span class="stamp ok">On loan</span>`;
}
function formatDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

/* ================= CATALOG ================= */
let catalogSearch='', catalogGenre='All';
function renderCatalog(){
  const genres = ['All', ...new Set(books.map(b=>b.genre))];
  const filtered = books.filter(b=>{
    const matchesSearch = (b.title+b.author+b.isbn).toLowerCase().includes(catalogSearch.toLowerCase());
    const matchesGenre = catalogGenre==='All' || b.genre===catalogGenre;
    return matchesSearch && matchesGenre;
  });
  return `
  <div class="page-head">
    <div><h1>Catalog</h1><p>${books.length} titles on record.</p></div>
    <button class="btn" onclick="openBookForm()">+ Add title</button>
  </div>
  <div class="toolbar">
    <input type="text" class="search-input" id="catSearch" placeholder="Search by title, author, or ISBN…" value="${catalogSearch}">
    <select id="catGenre">${genres.map(g=>`<option ${g===catalogGenre?'selected':''}>${g}</option>`).join('')}</select>
  </div>
  ${filtered.length? `<div class="catalog-grid">${filtered.map(bookCard).join('')}</div>` : `<div class="empty">No titles match that search.</div>`}
  `;
}
function bookCard(b){
  const avail = copiesAvailable(b);
  const out = avail<=0;
  const avg = avgRating(b);
  const waitCount = reservations.filter(r=>r.bookId===b.id && !r.fulfilled).length;
  const initials = b.title.split(' ').filter(w=>w.length>2).slice(0,2).map(w=>w[0]).join('') || b.title[0];
  const coverInner = b.cover
    ? `<img src="${b.cover}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:3px;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">${initials}</span>`
    : initials;
  return `
  <div class="catalog-card ${out?'out':''}">
    <div class="cover" style="background:${b.color||'#1B4332'}">${coverInner}</div>
    <div class="cover-body">
      <div class="call-no">${b.call}</div>
      <h3>${b.title}</h3>
      <div class="author">${b.author}</div>
      ${avg ? `<div class="rating-line"><span class="stars">${starString(avg)}</span> ${avg.toFixed(1)} (${b.ratings.length})</div>` : `<div class="rating-line">No reviews yet</div>`}
      <div class="meta-row">
        <span class="pill">${b.genre}</span>
        <span class="pill ${out?'status-out':'status-available'}">${out?'All copies out':avail+' of '+b.copies+' available'}</span>
        ${waitCount ? `<span class="pill" style="color:var(--gold);border-color:var(--gold);">${waitCount} waiting</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn secondary small" onclick="openBookForm(${b.id})">Edit</button>
        <button class="btn secondary small" onclick="openReviewForm(${b.id})">Rate &amp; review</button>
        ${out ? `<button class="btn gold small" onclick="joinWaitlist(${b.id})">Join waitlist</button>` : ''}
        <button class="btn danger small" onclick="deleteBook(${b.id})">Remove</button>
      </div>
    </div>
  </div>`;
}
function openBookForm(id){
  const b = id ? bookById(id) : null;
  openModal(`
    <h2>${b?'Edit title':'Add a new title'}</h2>
    <form id="bookForm">
      <div class="field"><label>Title</label><input required name="title" value="${b?b.title:''}"></div>
      <div class="field"><label>Author</label><input required name="author" value="${b?b.author:''}"></div>
      <div class="two-col">
        <div class="field"><label>Genre</label><input required name="genre" value="${b?b.genre:''}"></div>
        <div class="field"><label>Call number</label><input required name="call" value="${b?b.call:''}"></div>
      </div>
      <div class="two-col">
        <div class="field"><label>ISBN</label><input required name="isbn" value="${b?b.isbn:''}"></div>
        <div class="field"><label>Copies owned</label><input required type="number" min="1" name="copies" value="${b?b.copies:1}"></div>
      </div>
      <div class="field"><label>Cover image URL (optional)</label><input type="url" name="cover" placeholder="https://…" value="${b?b.cover||'':''}"></div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">${b?'Save changes':'Add title'}</button>
      </div>
    </form>
  `);
  document.getElementById('bookForm').onsubmit = (e)=>{
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    data.copies = parseInt(data.copies,10);
    if(b){ Object.assign(b, data); toast('Title updated'); }
    else {
      const palette = ['#1B4332','#3B5A73','#8B3A3A','#6B4B73','#B8860B','#4B6B3A'];
      books.push({id:nextIds.book++, ratings:[], color:palette[books.length%palette.length], ...data});
      toast('Title added to catalog');
    }
    closeModal(); render();
  };
}
function deleteBook(id){
  const activeLoans = transactions.some(t=>t.bookId===id && !t.returnDate);
  if(activeLoans){ toast("Can't remove — copies are currently on loan"); return; }
  if(!confirm('Remove this title from the catalog?')) return;
  books = books.filter(b=>b.id!==id);
  reservations = reservations.filter(r=>r.bookId!==id);
  toast('Title removed'); render();
}

/* ----- Ratings & reviews ----- */
function openReviewForm(bookId){
  const b = bookById(bookId);
  openModal(`
    <h2>Rate &amp; review</h2>
    <div class="call-no" style="margin-bottom:10px;">${b.title}</div>
    <form id="reviewForm">
      <div class="field"><label>Your name</label><input required name="member" placeholder="e.g. Jordan Lee" list="memberNames"></div>
      <datalist id="memberNames">${members.map(m=>`<option value="${m.name}">`).join('')}</datalist>
      <div class="field">
        <label>Rating</label>
        <div class="star-picker" id="starPicker">${[1,2,3,4,5].map(n=>`<span data-val="${n}">★</span>`).join('')}</div>
        <input type="hidden" name="stars" id="starsInput" value="5" required>
      </div>
      <div class="field"><label>Comment</label><textarea name="comment" rows="3" placeholder="What did you think?"></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">Submit review</button>
      </div>
    </form>
    ${b.ratings.length ? `<div class="section-title" style="margin-top:22px;">Existing reviews</div>${b.ratings.map(r=>`
      <div class="review-item"><span class="stars">${starString(r.stars)}</span> — ${r.comment||'<em>No comment</em>'}<br><span class="who">${r.member} · ${formatDate(r.date)}</span></div>
    `).join('')}` : ''}
  `);
  const picker = document.getElementById('starPicker');
  const paintStars = (val)=>{
    [...picker.children].forEach(s=> s.classList.toggle('active', parseInt(s.dataset.val)<=val));
  };
  paintStars(5);
  picker.addEventListener('click', e=>{
    const span = e.target.closest('span'); if(!span) return;
    const val = parseInt(span.dataset.val);
    document.getElementById('starsInput').value = val;
    paintStars(val);
  });
  document.getElementById('reviewForm').onsubmit = (e)=>{
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    b.ratings.push({id:nextIds.rating++, member:data.member, stars:parseInt(data.stars,10), comment:data.comment, date:todayISO()});
    toast('Review added — thank you!');
    closeModal(); render();
  };
}

/* ----- Reservations / waitlist ----- */
function joinWaitlist(bookId){
  if(!members.length){ toast('Add a member first'); return; }
  const options = members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  openModal(`
    <h2>Join waitlist</h2>
    <div class="call-no" style="margin-bottom:12px;">${bookById(bookId).title}</div>
    <form id="waitlistForm">
      <div class="field"><label>Member</label><select name="memberId" required>${options}</select></div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">Add to waitlist</button>
      </div>
    </form>
  `);
  document.getElementById('waitlistForm').onsubmit=(e)=>{
    e.preventDefault();
    const memberId = parseInt(new FormData(e.target).get('memberId'),10);
    if(reservations.some(r=>r.bookId===bookId && r.memberId===memberId && !r.fulfilled)){
      toast('This member is already on the waitlist'); closeModal(); return;
    }
    reservations.push({id:nextIds.res++, bookId, memberId, requestDate:todayISO(), fulfilled:false});
    toast('Added to waitlist'); closeModal(); render();
  };
}

/* ================= MEMBERS ================= */
let memberSearch='';
function renderMembers(){
  const filtered = members.filter(m=>(m.name+m.email+m.memberNo).toLowerCase().includes(memberSearch.toLowerCase()));
  return `
  <div class="page-head">
    <div><h1>Members</h1><p>${members.length} registered members.</p></div>
    <button class="btn" onclick="openMemberForm()">+ Add member</button>
  </div>
  <div class="toolbar"><input type="text" class="search-input" id="memberSearch" placeholder="Search members…" value="${memberSearch}"></div>
  ${filtered.length ? `<table><thead><tr><th>Member No.</th><th>Name</th><th>Email</th><th>Joined</th><th>On loan</th><th>Fines due</th><th></th></tr></thead><tbody>
    ${filtered.map(m=>{
      const activeCount = transactions.filter(t=>t.memberId===m.id && !t.returnDate).length;
      const fines = transactions.filter(t=>t.memberId===m.id && !t.finePaid).reduce((s,t)=>s+calcFine(t),0);
      return `<tr>
        <td class="mono">${m.memberNo}</td><td>${m.name}</td><td>${m.email}</td>
        <td class="mono">${formatDate(m.joined)}</td><td>${activeCount}</td>
        <td>${fines>0?`<span class="fine-tag">₹${fines}</span>`:'—'}</td>
        <td><button class="btn secondary small" onclick="openMemberForm(${m.id})">Edit</button>
        <button class="btn danger small" onclick="deleteMember(${m.id})">Remove</button></td>
      </tr>`;
    }).join('')}
  </tbody></table>` : `<div class="empty">No members match that search.</div>`}
  `;
}
function openMemberForm(id){
  const m = id ? memberById(id) : null;
  openModal(`
    <h2>${m?'Edit member':'Add a new member'}</h2>
    <form id="memberForm">
      <div class="field"><label>Full name</label><input required name="name" value="${m?m.name:''}"></div>
      <div class="field"><label>Email</label><input required type="email" name="email" value="${m?m.email:''}"></div>
      <div class="field"><label>Member number</label><input required name="memberNo" value="${m?m.memberNo:'MEM-'+(1000+members.length+1)}"></div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">${m?'Save changes':'Add member'}</button>
      </div>
    </form>
  `);
  document.getElementById('memberForm').onsubmit=(e)=>{
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    if(m){ Object.assign(m,data); toast('Member updated'); }
    else{ members.push({id:nextIds.member++, joined: todayISO(), ...data}); toast('Member added'); }
    closeModal(); render();
  };
}
function deleteMember(id){
  const activeLoans = transactions.some(t=>t.memberId===id && !t.returnDate);
  if(activeLoans){ toast("Can't remove — member has books on loan"); return; }
  if(!confirm('Remove this member?')) return;
  members = members.filter(m=>m.id!==id);
  reservations = reservations.filter(r=>r.memberId!==id);
  toast('Member removed'); render();
}

/* ================= CIRCULATION ================= */
function renderCirculation(){
  const availableBooks = books.filter(b=>copiesAvailable(b)>0);
  const activeLoans = transactions.filter(t=>!t.returnDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  return `
  <div class="page-head">
    <div><h1>Circulation</h1><p>Issue titles to members and process returns.</p></div>
    <button class="btn" onclick="openIssueForm()" ${availableBooks.length?'':'disabled'}>+ Issue a book</button>
  </div>
  <div class="section-title">Currently on loan</div>
  ${activeLoans.length? `<table><thead><tr><th>Book</th><th>Member</th><th>Issued</th><th>Due</th><th>Status</th><th>Fine</th><th></th></tr></thead><tbody>
  ${activeLoans.map(t=>{
    const b=bookById(t.bookId), m=memberById(t.memberId);
    const fine = calcFine(t);
    return `<tr>
      <td>${b?b.title:'<em>deleted title</em>'}</td>
      <td>${m?m.name:'<em>removed member</em>'}</td>
      <td class="mono">${formatDate(t.issueDate)}</td>
      <td class="mono">${formatDate(t.dueDate)}</td>
      <td>${statusStamp(t)}</td>
      <td>${fine>0?`<span class="fine-tag">₹${fine}</span>`:'—'}</td>
      <td><button class="btn secondary small" onclick="returnBook(${t.id})">Mark returned</button></td>
    </tr>`;
  }).join('')}
  </tbody></table>` : `<div class="empty">Nothing is currently checked out.</div>`}
  `;
}
function openIssueForm(){
  const availableBooks = books.filter(b=>copiesAvailable(b)>0);
  if(!availableBooks.length){ toast('No copies available to issue'); return; }
  if(!members.length){ toast('Add a member first'); return; }
  openModal(`
    <h2>Issue a book</h2>
    <form id="issueForm">
      <div class="field"><label>Title</label>
        <select name="bookId" required>${availableBooks.map(b=>`<option value="${b.id}">${b.title} — ${copiesAvailable(b)} available</option>`).join('')}</select>
      </div>
      <div class="field"><label>Member</label>
        <select name="memberId" required>${members.map(m=>`<option value="${m.id}">${m.name} (${m.memberNo})</option>`).join('')}</select>
      </div>
      <div class="two-col">
        <div class="field"><label>Issue date</label><input type="date" name="issueDate" value="${todayISO()}" required></div>
        <div class="field"><label>Due date</label><input type="date" name="dueDate" value="${addDays(todayISO(),14)}" required></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn">Issue book</button>
      </div>
    </form>
  `);
  document.getElementById('issueForm').onsubmit=(e)=>{
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target).entries());
    const bookId = parseInt(d.bookId), memberId = parseInt(d.memberId);
    transactions.push({id:nextIds.txn++, bookId, memberId, issueDate:d.issueDate, dueDate:d.dueDate, returnDate:null, finePaid:false});
    const res = reservations.find(r=>r.bookId===bookId && r.memberId===memberId && !r.fulfilled);
    if(res) res.fulfilled = true;
    toast('Book issued'); closeModal(); render();
  };
}
function returnBook(txnId){
  const t = transactions.find(t=>t.id===txnId);
  if(!t) return;
  t.returnDate = todayISO();
  const fine = calcFine(t);
  toast(fine>0 ? `Returned — ₹${fine} fine applied` : 'Marked as returned');
  const nextInLine = reservations.filter(r=>r.bookId===t.bookId && !r.fulfilled).sort((a,b)=>a.requestDate.localeCompare(b.requestDate))[0];
  if(nextInLine){
    const m = memberById(nextInLine.memberId);
    setTimeout(()=>toast(`📌 ${m?m.name:'A member'} is next on the waitlist for this title`), 400);
  }
  render();
}
function payFine(txnId){
  const t = transactions.find(t=>t.id===txnId);
  if(!t) return;
  t.finePaid = true;
  toast('Fine marked as paid'); render();
}

/* ================= RESERVATIONS ================= */
function renderReservations(){
  const pending = reservations.filter(r=>!r.fulfilled).sort((a,b)=>a.requestDate.localeCompare(b.requestDate));
  const grouped = {};
  pending.forEach(r=>{ (grouped[r.bookId] = grouped[r.bookId]||[]).push(r); });

  return `
  <div class="page-head"><div><h1>Reservations</h1><p>${pending.length} member${pending.length===1?'':'s'} waiting across ${Object.keys(grouped).length} title${Object.keys(grouped).length===1?'':'s'}.</p></div></div>
  ${pending.length ? Object.entries(grouped).map(([bookId, list])=>{
    const b = bookById(parseInt(bookId));
    return `
    <div class="section-title">${b?b.title:'Deleted title'} <span class="queue-badge">${list.length} in queue</span></div>
    <table><thead><tr><th>Position</th><th>Member</th><th>Requested</th><th></th></tr></thead><tbody>
      ${list.map((r,i)=>{
        const m = memberById(r.memberId);
        return `<tr>
          <td class="mono">#${i+1}</td>
          <td>${m?m.name:'<em>removed member</em>'}</td>
          <td class="mono">${formatDate(r.requestDate)}</td>
          <td><button class="btn secondary small" onclick="cancelReservation(${r.id})">Remove from queue</button></td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
  }).join('') : `<div class="empty">No one is currently on a waitlist. Reservations appear here when a member requests a title with no copies available.</div>`}
  `;
}
function cancelReservation(id){
  reservations = reservations.filter(r=>r.id!==id);
  toast('Removed from waitlist'); render();
}

/* ================= ANALYTICS ================= */
function renderAnalytics(){
  const borrowCounts = {};
  transactions.forEach(t=>{ borrowCounts[t.bookId] = (borrowCounts[t.bookId]||0)+1; });
  const topBooks = Object.entries(borrowCounts).map(([id,count])=>({book:bookById(parseInt(id)),count}))
    .filter(x=>x.book).sort((a,b)=>b.count-a.count).slice(0,5);
  const maxBorrow = Math.max(1, ...topBooks.map(x=>x.count));

  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    months.push({key:d.toISOString().slice(0,7), label:d.toLocaleDateString('en-US',{month:'short',year:'2-digit'})});
  }
  const monthlyCounts = months.map(m=>({...m, count: transactions.filter(t=>t.issueDate.slice(0,7)===m.key).length}));
  const maxMonthly = Math.max(1, ...monthlyCounts.map(m=>m.count));

  const genreCounts = {};
  books.forEach(b=>{ genreCounts[b.genre] = (genreCounts[b.genre]||0)+1; });
  const genreEntries = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]);
  const maxGenre = Math.max(1, ...genreEntries.map(g=>g[1]));

  return `
  <div class="page-head"><div><h1>Analytics</h1><p>A quick look at what's moving through the library.</p></div></div>

  <div class="chart-card">
    <h3>Most borrowed titles (all time)</h3>
    ${topBooks.length ? topBooks.map(x=>`
      <div class="bar-row">
        <div class="bar-label">${x.book.title}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(x.count/maxBorrow*100).toFixed(0)}%"></div></div>
        <div class="bar-val">${x.count}</div>
      </div>`).join('') : `<div class="empty">No circulation data yet.</div>`}
  </div>

  <div class="chart-card">
    <h3>Books issued per month</h3>
    ${monthlyCounts.map(m=>`
      <div class="bar-row">
        <div class="bar-label">${m.label}</div>
        <div class="bar-track"><div class="bar-fill gold" style="width:${(m.count/maxMonthly*100).toFixed(0)}%"></div></div>
        <div class="bar-val">${m.count}</div>
      </div>`).join('')}
  </div>

  <div class="chart-card">
    <h3>Catalog by genre</h3>
    ${genreEntries.map(([g,c])=>`
      <div class="bar-row">
        <div class="bar-label">${g}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(c/maxGenre*100).toFixed(0)}%"></div></div>
        <div class="bar-val">${c}</div>
      </div>`).join('')}
  </div>
  `;
}

/* ================= HISTORY ================= */
function renderHistory(){
  const all = [...transactions].sort((a,b)=>b.issueDate.localeCompare(a.issueDate));
  return `
  <div class="page-head"><div><h1>History</h1><p>Complete circulation log — ${all.length} transactions.</p></div></div>
  ${all.length? `<table><thead><tr><th>Book</th><th>Member</th><th>Issued</th><th>Due</th><th>Returned</th><th>Status</th><th>Fine</th><th></th></tr></thead><tbody>
  ${all.map(t=>{
    const b=bookById(t.bookId), m=memberById(t.memberId);
    const fine = calcFine(t);
    return `<tr>
      <td>${b?b.title:'<em>deleted title</em>'}</td>
      <td>${m?m.name:'<em>removed member</em>'}</td>
      <td class="mono">${formatDate(t.issueDate)}</td>
      <td class="mono">${formatDate(t.dueDate)}</td>
      <td class="mono">${t.returnDate?formatDate(t.returnDate):'—'}</td>
      <td>${statusStamp(t)}</td>
      <td>${fine>0 ? `<span class="fine-tag ${t.finePaid?'paid':''}">₹${fine}</span>` : '—'}</td>
      <td>${fine>0 && !t.finePaid ? `<button class="btn secondary small" onclick="payFine(${t.id})">Mark paid</button>` : ''}</td>
    </tr>`;
  }).join('')}
  </tbody></table>` : `<div class="empty">No circulation history yet.</div>`}
  `;
}

/* ================= INPUT HANDLERS ================= */
function attachHandlers(){
  const cs = document.getElementById('catSearch');
  if(cs){ cs.oninput = e=>{catalogSearch=e.target.value; render(); restoreFocus('catSearch');}; }
  const cg = document.getElementById('catGenre');
  if(cg){ cg.onchange = e=>{catalogGenre=e.target.value; render();}; }
  const ms = document.getElementById('memberSearch');
  if(ms){ ms.oninput = e=>{memberSearch=e.target.value; render(); restoreFocus('memberSearch');}; }
}
function restoreFocus(id){
  const el = document.getElementById(id);
  if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
}
</script>
